<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black flex items-center justify-center h-screen text-white">

<div class="bg-white/10 backdrop-blur-lg p-8 rounded-xl w-80 shadow-lg">

    <h2 class="text-2xl mb-4 text-center font-bold">Create Account 🚀</h2>

    <input id="name" placeholder="Name"
           class="w-full p-2 mb-2 rounded bg-black/50">

    <input id="email" placeholder="Email"
           class="w-full p-2 mb-2 rounded bg-black/50">

    <input id="password" placeholder="Password"
           class="w-full p-2 mb-2 rounded bg-black/50">

    <input id="phone" placeholder="Phone"
           class="w-full p-2 mb-3 rounded bg-black/50">

    <!-- ✅ FIXED BUTTON -->
    <button id="registerBtn" onclick="register()"
            class="w-full bg-green-600 py-2 rounded hover:bg-green-700 transition">
        Register
    </button>

    <p id="message" class="text-center mt-3 text-green-400"></p>

    <p class="text-center mt-3 text-gray-400">
        Already have account?
        <a href="login.html" class="text-red-500 hover:underline">Login</a>
    </p>

</div>

<!-- ✅ FIXED JS PATH -->
<script src="/user/user.js"></script>

</body>
</html>
