<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Appointments</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<!-- 🔥 NAVBAR -->
<div class="flex justify-between items-center px-6 py-4 border-b border-gray-800">
    <h1 class="text-red-500 text-xl font-bold">My Appointments</h1>

    <button onclick="goHome()"
            class="bg-blue-600 px-3 py-1 rounded hover:bg-blue-700">
        Home
    </button>
</div>

<!-- 🔥 MAIN -->
<div class="p-6 max-w-5xl mx-auto">

    <div class="bg-zinc-900 p-6 rounded-xl shadow-lg">

        <h2 class="text-xl font-bold mb-4">Your Bookings</h2>

        <table class="w-full text-left">

            <thead class="text-gray-400 border-b border-gray-700">
            <tr>
                <th class="p-2">Provider</th>
                <th class="p-2">Date</th>
                <th class="p-2">Time</th>
                <th class="p-2">Status</th>
                <th class="p-2">Action</th>
            </tr>
            </thead>

            <tbody id="tableBody" class="text-gray-300"></tbody>

        </table>

    </div>

</div>

<!-- 🔥 RESCHEDULE MODAL (ADDED ONLY THIS) -->
<div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">

    <div class="bg-zinc-900 p-6 rounded-xl w-96 shadow-lg">

        <h2 class="text-lg font-bold mb-3">Reschedule Appointment</h2>

        <!-- DATE -->
        <input type="date" id="rescheduleDate"
               class="w-full p-2 mb-3 bg-black rounded border border-gray-700">

        <!-- LOAD BUTTON -->
        <button onclick="loadSlotsForReschedule()"
                class="w-full bg-blue-600 py-2 rounded mb-3">
            Load Slots
        </button>

        <!-- SLOT LIST -->
        <div id="slotContainer" class="grid grid-cols-2 gap-2 mb-3"></div>

        <!-- ACTION -->
        <div class="flex justify-end gap-2">
            <button onclick="closeModal()"
                    class="bg-gray-600 px-3 py-1 rounded">
                Cancel
            </button>

            <button onclick="confirmReschedule()"
                    class="bg-yellow-500 px-3 py-1 rounded">
                Confirm
            </button>
        </div>

    </div>

</div>

<script src="history.js"></script>

<script>
    function goHome(){
        window.location.href = "/provider/provider-list.html";
    }
</script>

</body>
</html>
