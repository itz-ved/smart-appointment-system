<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Provider Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<!-- 🔥 NAVBAR -->
<div class="flex justify-between items-center px-6 py-4 border-b border-gray-800">
    <h1 class="text-red-500 text-xl font-bold">Provider Dashboard</h1>

    <button onclick="logout()"
            class="bg-red-600 px-3 py-1 rounded hover:bg-red-700">
        Logout
    </button>
</div>

<!-- 🔥 MAIN -->
<div class="p-6 max-w-6xl mx-auto">

    <!-- ADD SLOT CARD -->
    <div class="bg-zinc-900 p-6 rounded-xl shadow-lg mb-6">

        <h2 class="text-xl font-bold mb-4">Add Slot</h2>

        <div class="flex flex-wrap gap-4">

            <input type="date" id="date"
                   class="bg-black p-2 rounded">

            <input type="time" id="startTime"
                   class="bg-black p-2 rounded">

            <input type="time" id="endTime"
                   class="bg-black p-2 rounded">

            <button onclick="createSlot()"
                    class="bg-green-600 px-4 py-2 rounded hover:bg-green-700">
                Add Slot
            </button>

            <button onclick="goBookings()"
                    class="bg-blue-600 px-4 py-2 rounded hover:bg-blue-700">
                View Bookings
            </button>

        </div>

        <p id="message" class="mt-3 text-green-400"></p>
    </div>

    <!-- SLOT TABLE -->
    <div class="bg-zinc-900 p-6 rounded-xl shadow-lg">

        <h2 class="text-xl font-bold mb-4">Your Slots</h2>

        <table class="w-full text-left">

            <thead class="text-gray-400 border-b border-gray-700">
            <tr>
                <th class="p-2">Date</th>
                <th class="p-2">Time</th>
                <th class="p-2">Status</th>
            </tr>
            </thead>

            <tbody id="slotTable" class="text-gray-300"></tbody>

        </table>

    </div>

</div>

<script src="/provider/provider-dashboard.js"></script>

<script>
    function logout(){
      localStorage.clear();
      window.location.href = "provider-login.html";
    }
</script>

</body>
</html>
