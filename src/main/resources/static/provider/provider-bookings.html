<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Provider Bookings</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<!-- 🔥 HEADER -->
<div class="flex justify-between items-center px-6 py-4 border-b border-gray-800">
    <h1 class="text-red-500 text-xl font-bold">Provider Dashboard</h1>

    <button onclick="goBack()"
            class="bg-blue-600 px-3 py-1 rounded hover:bg-blue-700 transition">
        Back
    </button>
</div>

<!-- 🔥 MAIN -->
<div class="p-6 max-w-6xl mx-auto">

    <div class="bg-zinc-900 p-6 rounded-xl shadow-lg">

        <h2 class="text-xl font-bold mb-4">My Bookings</h2>

        <table class="w-full text-left">

            <thead class="text-gray-400 border-b border-gray-700">
            <tr>
                <th class="p-3">User</th>
                <th class="p-3">Date</th>
                <th class="p-3">Time</th>
                <th class="p-3">Status</th>
            </tr>
            </thead>

            <tbody id="tableBody" class="text-gray-300"></tbody>

        </table>

    </div>

</div>

<script src="/provider/provider-bookings.js"></script>

<script>
    function goBack(){
        window.location.href = "/provider/provider-dashboard.html";
    }
</script>

</body>
</html>
