<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Provider Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black flex items-center justify-center h-screen text-white">

<div class="bg-white/10 backdrop-blur-lg p-8 rounded-xl w-96 shadow-lg">

    <h2 class="text-2xl mb-4 text-center font-bold text-green-400">
        Become a Provider 🚀
    </h2>

    <input id="name" placeholder="Name"
           class="w-full p-2 mb-2 rounded bg-black/50">

    <input id="serviceType" placeholder="Service (Doctor/Salon)"
           class="w-full p-2 mb-2 rounded bg-black/50">

    <input id="experience" placeholder="Experience"
           class="w-full p-2 mb-2 rounded bg-black/50">

    <input id="location" placeholder="Location"
           class="w-full p-2 mb-2 rounded bg-black/50">

    <input id="fees" placeholder="Fees"
           class="w-full p-2 mb-2 rounded bg-black/50">

    <input id="email" placeholder="Email"
           class="w-full p-2 mb-2 rounded bg-black/50">

    <input id="phone" placeholder="Phone"
           class="w-full p-2 mb-2 rounded bg-black/50">

    <input id="password" type="password" placeholder="Password"
           class="w-full p-2 mb-3 rounded bg-black/50">

    <button onclick="registerProvider()"
            class="w-full bg-green-600 py-2 rounded hover:bg-green-700">
        Register
    </button>

    <p id="message" class="text-center mt-3"></p>

    <p class="text-center mt-4 text-gray-400">
        Already registered?
        <a href="provider-login.html" class="text-red-500">Login</a>
    </p>

</div>

<script src="provider-auth.js"></script>

</body>
</html>
